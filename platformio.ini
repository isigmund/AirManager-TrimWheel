; PlatformIO project configuration for the AirManager TrimWheel firmware.
; Target board: ESP32-S3 based PD-Stepper (https://github.com/joshr120/PD-Stepper)

[env:pd-stepper]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Remote serial bridge (RFC2217) to the board on the workbench.
upload_port = rfc2217://192.168.1.228:4001
monitor_port = rfc2217://192.168.1.228:4001

; Route `Serial` to the S3's native USB Serial/JTAG (CDC) so debug output
; reaches the workbench bridge, which is wired to the native USB port.
; Serial1 -> TMC2209 and Serial2 -> Air Manager are separate UARTs and stay
; free for those peripherals (UART0 / GPIO43-44 is now unused for debug).
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3

lib_deps =
    teemuatlut/TMCStepper @ ^0.7.3
    robtillaart/AS5600 @ ^0.6.4
